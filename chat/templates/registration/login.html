<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ChatApp</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2);
            width: 100%;
            max-width: 400px;
            transition: transform 0.2s;
        }

        h2 {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Styling Django's form.as_p structure */
        .django-form p {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .django-form label {
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .django-form input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        .django-form input:focus {
            outline: none;
            border-color: #4f46e5;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        /* Error styling just in case Django renders form errors inside <p> tags */
        .django-form .errorlist {
            list-style: none;
            color: #dc2626;
            font-size: 13px;
            margin-bottom: 10px;
            padding: 0;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #4f46e5; /* Trendy chat app purple/blue */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #4338ca;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        .signup-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #64748b;
        }

        .signup-link a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /* Mobile responsiveness adjustments */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                box-shadow: none;
                background: transparent;
            }
            body {
                background-color: #ffffff;
                align-items: flex-start;
                padding-top: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your details to sign in</p>

        <form method="post" class="django-form">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <button type="submit">Log In</button>
        </form>
        
        <p class="signup-link">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>

</body>
</html>
