<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            /* Fixes the mobile input cutoff by using Dynamic Viewport Height */
            height: 100vh;
            height: 100dvh; 
            background: #efeae2; 
            overflow: hidden;
        }

        .chat-header {
            background: #f0f2f5;
            padding: 14px 16px;
            border-bottom: 1px solid #e1e4e8;
            font-weight: 600;
            font-size: 1.05rem;
            color: #111b21;
            flex-shrink: 0; /* Keeps it strictly pinned without overlap bugs */
        }

        #chat-log {
            flex-grow: 1;
            padding: 16px;
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 8px;
            /* Ensures content never gets stuck behind layout borders */
            box-sizing: border-box; 
        }

        .message {
            max-width: 75%;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.98rem; 
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.08);
        }

        .partner {
            background: #ffffff;
            align-self: flex-start;
            border-top-left-radius: 0;
            color: #111b21;
        }

        .me {
            background: #d9fdd3;
            align-self: flex-end;
            border-top-right-radius: 0;
            color: #111b21;
        }

        .time {
            font-size: 0.72rem;
            color: #667781;
            margin-left: 8px;
            float: right;
            margin-top: 4px;
        }

        .chat-footer {
            background: #f0f2f5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #e1e4e8;
            box-sizing: border-box;
            flex-shrink: 0; 
        }

        #chat-message-input {
            flex-grow: 1;
            padding: 12px 16px;
            border: 1px solid #fff;
            border-radius: 24px; 
            outline: none;
            font-size: 1rem; 
            background: #ffffff;
            box-sizing: border-box;
        }

        #chat-message-submit {
            padding: 12px 20px;
            background: #00a884;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        
        #chat-message-submit:hover {
            background: #008f72;
        }

        @media (max-width: 480px) {
            .chat-footer {
                padding: 10px;
                gap: 8px;
            }
            #chat-message-input {
                padding: 10px 14px;
            }
            #chat-message-submit {
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="chat-header">
        Chatting with: <span id="partner-name">{{ chat_partner }}</span>
    </div>

    <div id="chat-log"></div>

    <div class="chat-footer">
        <input id="chat-message-input" type="text" placeholder="Type a message..." autofocus autocomplete="off">
        <button id="chat-message-submit">Send</button>
    </div>

    {{ partner_id|json_script:"partner-id" }}

    <script>
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const partnerId = JSON.parse(document.getElementById('partner-id').textContent);
        const chatLog = document.querySelector('#chat-log');
        const usernameDisplay = document.getElementById('partner-name').textContent.trim();
        const messageInput = document.querySelector('#chat-message-input');
        const sendButton = document.querySelector('#chat-message-submit');

        const chatSocket = new WebSocket(
            `${protocol}://${window.location.host}/ws/chat/${partnerId}/`
        );

        function appendMessage(sender, text, rawTimestamp = "") {
            const wrapper = document.createElement('div');
            wrapper.classList.add('message');
            
            if (sender.toLowerCase() === usernameDisplay.toLowerCase()) {
                wrapper.classList.add('partner');
            } else {
                wrapper.classList.add('me');
            }
            
            let dateObj = rawTimestamp ? new Date(rawTimestamp) : new Date();
            if (isNaN(dateObj.getTime())) { dateObj = new Date(); }
            let displayTime = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
            
            wrapper.innerHTML = `${text} <span class="time">${displayTime}</span>`;
            
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight; 

            window.parent.postMessage({
                type: 'NEW_MESSAGE',
                partnerId: partnerId,
                partnerName: usernameDisplay
            }, '*');
        }

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            if (data.type === 'history') {
                chatLog.innerHTML = ''; 
                data.messages.forEach(msg => {
                    appendMessage(msg.sender, msg.message, msg.timestamp);
                });
            } 
            else if (data.type === 'chat') {
                appendMessage(data.sender, data.message, data.timestamp);
            }
        };

        chatSocket.onclose = function(e) {
            console.error('Chat connection severed unexpectedly.');
        };

        messageInput.onkeyup = function(e) {
            if (e.key === 'Enter') {
                sendButton.click();
            }
        };

        sendButton.onclick = function(e) {
            const message = messageInput.value;
            if (message.trim() !== "") {
                chatSocket.send(JSON.stringify({ 'message': message }));
                messageInput.value = '';
            }
        };
    </script>
</body>
</html>
